name: Android Builds

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: universal
            architectures: ""
          - name: arm64-v8a
            architectures: arm64-v8a
          - name: armeabi-v7a
            architectures: armeabi-v7a
          - name: x86_64
            architectures: x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Prepare Android signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/release.keystore
          fi

      - name: Build release APK
        shell: bash
        env:
          ARCHITECTURES: ${{ matrix.architectures }}
          ORG_GRADLE_PROJECT_MYAPP_UPLOAD_STORE_FILE: release.keystore
          ORG_GRADLE_PROJECT_MYAPP_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_MYAPP_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_MYAPP_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x android/gradlew
          cd android
          if [ -n "$ARCHITECTURES" ]; then
            ./gradlew :app:assembleRelease -PreactNativeArchitectures="$ARCHITECTURES"
          else
            ./gradlew :app:assembleRelease
          fi

      - name: Collect APK
        shell: bash
        run: |
          ls -R android/app/build/outputs/apk
          APK_PATH="$(find android/app/build/outputs/apk -type f -name '*.apk' ! -name '*unaligned.apk' | head -n 1)"
          if [ -z "$APK_PATH" ]; then
            echo "No APK found"
            exit 1
          fi
          cp "$APK_PATH" "android/app/build/outputs/apk/imgur-archive-viewer-${{ matrix.name }}-release.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ matrix.name }}-release
          path: android/app/build/outputs/apk/imgur-archive-viewer-${{ matrix.name }}-release.apk
